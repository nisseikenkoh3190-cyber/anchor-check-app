<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>管理画面</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #cbd5e1;
      --text: #0f172a;
      --muted: #475569;
      --accent: #0f172a;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }
    h1, h2 { margin: 0; }
    h1 { font-size: 28px; margin-bottom: 10px; }
    h2 { font-size: 20px; margin-bottom: 12px; }
    .muted {
      color: var(--muted);
      font-size: 13px;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }
    .field {
      display: grid;
      gap: 6px;
    }
    .label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }
    .select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 12px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }
    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }
    .btn.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .history-table th,
    .history-table td {
      border-bottom: 1px solid #e2e8f0;
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }
    @media (max-width: 720px) {
      .controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>管理画面</h1>
      <div class="muted">現場と図面を選択して、現場運用画面または配置編集画面へ移動できます。</div>
      <div class="controls">
        <label class="field">
          <span class="label">現場選択</span>
          <select class="select" id="siteSelector"></select>
        </label>
        <label class="field">
          <span class="label">図面選択</span>
          <select class="select" id="drawingSelector"></select>
        </label>
      </div>
      <div class="btn-row">
        <button class="btn primary" id="goFieldBtn" type="button">現場画面へ</button>
        <button class="btn" id="goEditorBtn" type="button">配置編集へ</button>
        <button class="btn" id="xlsxBtn" type="button">Excel出力</button>
        <button class="btn" id="clearBtn" type="button">履歴クリア</button>
      </div>
    </div>

    <div class="card">
      <h2>履歴</h2>
      <div id="tableWrap" class="muted">履歴はありません</div>
    </div>
  </div>

  <script src="./site-config.js"></script>
  <script>
    const SITE_DATA_URL = "./sites.json";

    let sites = [];
    let currentSite = null;
    let currentDrawing = null;

    const siteSelector = document.getElementById("siteSelector");
    const drawingSelector = document.getElementById("drawingSelector");
    const goFieldBtn = document.getElementById("goFieldBtn");
    const goEditorBtn = document.getElementById("goEditorBtn");

    function sanitizeValue(value) {
      return String(value == null ? "" : value).replace(/[\r\n]+/g, " ").trim();
    }

    function escapeHtml(value) {
      return sanitizeValue(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getHistoryKey() {
      return SiteConfig.getHistoryStorageKey(currentSite.siteId, currentDrawing.drawingId);
    }

    function getLegacyHistoryKeys() {
      return [
        "history_" + currentSite.siteId,
        "history_" + currentSite.title
      ];
    }

    function loadRows() {
      try {
        let rows = JSON.parse(localStorage.getItem(getHistoryKey()) || "[]");
        if (!rows.length) {
          for (const key of getLegacyHistoryKeys()) {
            rows = JSON.parse(localStorage.getItem(key) || "[]");
            if (rows.length) break;
          }
        }
        return Array.isArray(rows) ? rows : [];
      } catch (_error) {
        return [];
      }
    }

    function populateSiteSelector() {
      siteSelector.innerHTML = sites
        .map(function (site) {
          return '<option value="' + escapeHtml(site.siteId) + '">' + escapeHtml(site.siteName || site.siteId) + "</option>";
        })
        .join("");
      siteSelector.value = currentSite.siteId;
    }

    function populateDrawingSelector() {
      drawingSelector.innerHTML = currentSite.drawings
        .map(function (drawing) {
          return '<option value="' + escapeHtml(drawing.drawingId) + '">' + escapeHtml(drawing.drawingName) + "</option>";
        })
        .join("");
      drawingSelector.value = currentDrawing.drawingId;
    }

    function setCurrentSite(siteId) {
      currentSite = SiteConfig.findSiteById(sites, siteId) || sites[0];
    }

    function setCurrentDrawing(drawingId) {
      currentDrawing = currentSite.drawings.find(function (drawing) { return drawing.drawingId === drawingId; })
        || currentSite.drawings.find(function (drawing) { return drawing.drawingId === currentSite.defaultDrawingId; })
        || currentSite.drawings[0];
    }

    function buildQuery() {
      return new URLSearchParams({
        SITE: currentSite.siteId,
        DRAWING: currentDrawing.drawingId
      });
    }

    function syncQuery() {
      window.history.replaceState(null, "", "admin.html?" + buildQuery().toString());
    }

    function goToFieldScreen() {
      location.href = "index.html?" + buildQuery().toString();
    }

    function goToEditorScreen() {
      location.href = "editor.html?" + buildQuery().toString();
    }

    function renderHistory() {
      const rows = loadRows();
      const wrap = document.getElementById("tableWrap");
      if (!rows.length) {
        wrap.innerHTML = "履歴はありません";
        return;
      }

      wrap.innerHTML = [
        '<table class="history-table">',
        "<thead>",
        "<tr><th>時刻</th><th>位置</th><th>要求TYPE</th><th>読取TYPE</th><th>結果</th></tr>",
        "</thead>",
        "<tbody>",
        rows.map(function (row) {
          return "<tr>"
            + "<td>" + escapeHtml(row.time) + "</td>"
            + "<td>" + escapeHtml(row.displayName || row.pos) + "</td>"
            + "<td>" + escapeHtml(row.requiredType) + "</td>"
            + "<td>" + escapeHtml(row.scannedType) + "</td>"
            + "<td>" + (row.result === "ok" ? "適合" : "不一致") + "</td>"
            + "</tr>";
        }).join(""),
        "</tbody>",
        "</table>"
      ].join("");
    }

    function exportXlsx() {
      const rows = loadRows();
      if (!rows.length) {
        alert("出力する履歴がありません。");
        return;
      }
      if (typeof XLSX === "undefined") {
        alert("Excel 出力ライブラリの読み込みに失敗しました。");
        return;
      }

      const data = [
        ["時刻", "位置", "要求TYPE", "読取TYPE", "結果"]
      ].concat(rows.map(function (row) {
        return [
          sanitizeValue(row.time),
          sanitizeValue(row.displayName || row.pos),
          sanitizeValue(row.requiredType),
          sanitizeValue(row.scannedType),
          row.result === "ok" ? "適合" : "不一致"
        ];
      }));

      const workbook = XLSX.utils.book_new();
      const sheet = XLSX.utils.aoa_to_sheet(data);
      sheet["!cols"] = [
        { wch: 22 },
        { wch: 24 },
        { wch: 18 },
        { wch: 18 },
        { wch: 10 }
      ];
      XLSX.utils.book_append_sheet(workbook, sheet, "履歴");
      XLSX.writeFile(workbook, "anchor_bolt_history_" + currentSite.siteId + "_" + currentDrawing.drawingId + ".xlsx");
    }

    function handleSiteChange() {
      setCurrentSite(siteSelector.value);
      setCurrentDrawing(currentSite.defaultDrawingId);
      populateDrawingSelector();
      syncQuery();
      renderHistory();
    }

    function handleDrawingChange() {
      setCurrentDrawing(drawingSelector.value);
      syncQuery();
      renderHistory();
    }

    async function initializeAdmin() {
      sites = await SiteConfig.loadSitesData(SITE_DATA_URL);

      const params = new URLSearchParams(location.search);
      setCurrentSite(SiteConfig.resolveRequestedSiteId(sites, params));
      setCurrentDrawing(SiteConfig.resolveRequestedDrawingId(currentSite, params));

      populateSiteSelector();
      populateDrawingSelector();
      syncQuery();
      renderHistory();
    }

    document.getElementById("xlsxBtn").addEventListener("click", exportXlsx);
    document.getElementById("clearBtn").addEventListener("click", function () {
      if (!confirm("履歴を削除しますか？")) return;
      localStorage.removeItem(getHistoryKey());
      renderHistory();
    });
    siteSelector.addEventListener("change", handleSiteChange);
    drawingSelector.addEventListener("change", handleDrawingChange);
    goFieldBtn.addEventListener("click", goToFieldScreen);
    goEditorBtn.addEventListener("click", goToEditorScreen);

    initializeAdmin().catch(function (error) {
      console.error(error);
      alert("admin.html の初期化に失敗しました。sites.json を確認してください。");
    });
  </script>
</body>
</html>
