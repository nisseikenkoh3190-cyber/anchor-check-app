<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>アンカーボルト照合アプリ 管理画面</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:#f8fafc;color:#0f172a}
    .wrap{max-width:960px;margin:0 auto;padding:20px}
    .card{background:#fff;border:1px solid #cbd5e1;border-radius:16px;padding:16px;margin-bottom:16px}
    h1{margin:0 0 12px} h2{margin:0 0 10px;font-size:20px}
    .btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:0 14px;border:1px solid #cbd5e1;border-radius:12px;background:#fff;color:#0f172a;text-decoration:none;cursor:pointer;font-size:14px;font-weight:700}
    .btn.primary{background:#0f172a;color:#fff;border-color:#0f172a}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{border-bottom:1px solid #e2e8f0;padding:10px;text-align:left;vertical-align:top}
    .muted{color:#475569;font-size:13px}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>管理画面</h1>
      <div class="muted">CSVの空行問題を避けるため、Excel形式（.xlsx）で直接出力する版です。</div>
      <div style="margin-top:12px; display:flex; gap:8px; flex-wrap:wrap;">
        <a class="btn" id="backLink" href="index.html">現場画面へ戻る</a>
        <button class="btn primary" id="xlsxBtn">Excel出力</button>
        <button class="btn" id="clearBtn">履歴クリア</button>
      </div>
    </div>
    <div class="card">
      <h2>判定履歴</h2>
      <div id="tableWrap" class="muted">履歴はありません</div>
    </div>
  </div>

  <script>
    const requestedTitle = new URLSearchParams(location.search).get("TITLE");
    const currentTitle = requestedTitle || "sampleA";
    const historyKey = `history_${currentTitle}`;

    function loadRows() {
      try { return JSON.parse(localStorage.getItem(historyKey) || "[]"); }
      catch { return []; }
    }

    function sanitizeValue(v) {
      return String(v ?? "").replace(/[\r\n]+/g, " ").trim();
    }

    function render() {
      const rows = loadRows();
      const wrap = document.getElementById("tableWrap");
      if (!rows.length) { wrap.innerHTML = "履歴はありません"; return; }
      wrap.innerHTML = `
        <table>
          <thead>
            <tr><th>時刻</th><th>位置</th><th>柱種別</th><th>要求TYPE</th><th>読取TYPE</th><th>判定</th></tr>
          </thead>
          <tbody>
            ${rows.map(r => `<tr><td>${sanitizeValue(r.time)}</td><td>${sanitizeValue(r.pos)}</td><td>${sanitizeValue(r.label)}</td><td>${sanitizeValue(r.requiredType)}</td><td>${sanitizeValue(r.scannedType)}</td><td>${r.result === "ok" ? "適合" : "不一致"}</td></tr>`).join("")}
          </tbody>
        </table>`;
    }

    function exportXlsx() {
      const rows = loadRows();
      if (!rows.length) { alert("出力する履歴がありません。"); return; }
      if (typeof XLSX === "undefined") {
        alert("Excel出力ライブラリの読込に失敗しました。通信状態を確認して再読み込みしてください。");
        return;
      }

      const data = [
        ["時刻","位置","柱種別","要求TYPE","読取TYPE","判定"],
        ...rows.map(r => [
          sanitizeValue(r.time),
          sanitizeValue(r.pos),
          sanitizeValue(r.label),
          sanitizeValue(r.requiredType),
          sanitizeValue(r.scannedType),
          r.result === "ok" ? "適合" : "不一致"
        ])
      ];

      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(data);

      ws["!cols"] = [
        { wch: 22 },
        { wch: 12 },
        { wch: 10 },
        { wch: 18 },
        { wch: 18 },
        { wch: 10 }
      ];

      XLSX.utils.book_append_sheet(wb, ws, "判定履歴");
      XLSX.writeFile(wb, `anchor_bolt_history_${currentTitle}.xlsx`);
    }

    document.getElementById("backLink").href = `index.html?TITLE=${encodeURIComponent(currentTitle)}`;
    document.getElementById("xlsxBtn").addEventListener("click", exportXlsx);
    document.getElementById("clearBtn").addEventListener("click", () => {
      if (!confirm("履歴を削除しますか？")) return;
      localStorage.removeItem(historyKey);
      render();
    });
    render();
  </script>
</body>
</html>
