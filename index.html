<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>繧｢繝ｳ繧ｫ繝ｼ繝懊Ν繝育・蜷医い繝励Μ 迴ｾ蝣ｴ逕ｻ髱｢</title>
  <style>
    :root{
      --bg:#f4f7fb; --card:#fff; --line:#cbd5e1; --text:#0f172a; --muted:#475569;
      --ok:#10b981; --okbg:#ecfdf5; --ng:#ef4444; --ngbg:#fef2f2; --accent:#0f172a;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{
      padding:max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right))
             max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
    }
    .app{
      max-width:980px; margin:0 auto; min-height:calc(100vh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 20px);
      display:grid; grid-template-rows:auto minmax(320px, 1fr) auto auto; gap:10px;
    }
    .topbar{
      display:flex;justify-content:space-between;align-items:center;gap:8px;
      background:var(--card);border:1px solid var(--line);border-radius:16px;padding:10px 12px
    }
    .title{font-size:16px;font-weight:700}
    .meta{font-size:12px;color:var(--muted)}
    .topbar-main{min-width:0;flex:1}
    .topbar-controls{
      display:grid;grid-template-columns:1fr 1fr;gap:8px;min-width:min(420px, 100%)
    }
    .field{display:grid;gap:4px}
    .field-label{font-size:11px;color:var(--muted);font-weight:700}
    .select{
      width:100%;min-height:40px;border:1px solid var(--line);border-radius:12px;
      padding:0 12px;background:#fff;color:var(--text);font-size:14px
    }
    .link-btn{
      display:inline-flex;align-items:center;justify-content:center;min-height:42px;
      border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--text);
      padding:0 12px;text-decoration:none;font-size:14px;font-weight:600
    }
    .plan-card{
      position:relative;background:var(--card);border:1px solid var(--line);
      border-radius:18px;overflow:hidden;min-height:320px
    }
    .plan-viewport{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;padding:8px;overflow:hidden;touch-action:none
    }
    .plan-content{
      position:absolute;inset:8px;touch-action:none;transform-origin:0 0
    }
    .plan-stage{
      position:absolute
    }
    .plan-img{
      display:block;width:100%;height:100%;object-fit:fill;user-select:none;
      -webkit-user-drag:none;pointer-events:none
    }
    .marker-layer{position:absolute;inset:0;pointer-events:none;overflow:visible}
    .marker{
      fill:rgba(245,158,11,.28);stroke:#b45309;stroke-width:2;cursor:pointer;pointer-events:visiblePainted
    }
    .marker.active{
      fill:rgba(14,165,233,.34);stroke:#0369a1
    }
    .marker.ok{
      fill:rgba(16,185,129,.32);stroke:#059669
    }
    .marker.ng{
      fill:rgba(239,68,68,.28);stroke:#dc2626
    }
    .marker.feedback{
      fill:rgba(14,165,233,.34);stroke:#0369a1
    }
    .info-row{display:grid;grid-template-columns:1fr 1.1fr;gap:10px}
    .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px}
    .panel-title{font-size:12px;color:var(--muted);margin-bottom:6px}
    .selected-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .selected-info{min-width:0;flex:1}
    .selected-main{font-size:22px;font-weight:800;line-height:1.2;word-break:break-word}
    .selected-sub{font-size:14px;color:var(--muted);margin-top:4px;min-height:18px;word-break:break-word}
    .btn.inline{
      width:auto;min-width:88px;min-height:44px;padding:0 14px;flex:0 0 auto
    }
    .result-box{
      border-radius:16px;min-height:110px;display:flex;flex-direction:column;justify-content:center;
      padding:12px 14px;border:1px solid var(--line);background:#f8fafc
    }
    .result-box.ok{background:var(--okbg);border-color:var(--ok)}
    .result-box.ng{background:var(--ngbg);border-color:var(--ng)}
    .result-state{font-size:30px;font-weight:900;line-height:1}
    .result-detail{margin-top:8px;font-size:14px;line-height:1.5}
    .bottom-panel{
      background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;
      display:grid;grid-template-columns:1.1fr .85fr;gap:10px
    }
    .stack{display:grid;gap:8px}
    .stack.compact{align-content:start}
    .toolbar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .btn,.input{
      width:100%;min-height:52px;border-radius:14px;border:1px solid var(--line);font-size:16px
    }
    .btn{background:#fff;color:var(--text);font-weight:700;cursor:pointer}
    .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
    .btn.warn{background:#fff7ed;border-color:#fdba74}
    .btn.danger{background:#fef2f2;border-color:#fecaca;color:#b91c1c}
    .input{padding:12px 14px}
    .status{font-size:13px;color:var(--muted);line-height:1.4}
    .history-card{
      background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;display:grid;gap:10px
    }
    .history-head{
      display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap
    }
    .history-actions{
      display:flex;gap:8px;flex-wrap:wrap
    }
    .history-count{
      font-size:12px;color:var(--muted)
    }
    .history-panel{
      display:none;gap:8px
    }
    .history-panel.open{
      display:grid
    }
    .history-empty{
      border:1px dashed var(--line);border-radius:14px;padding:16px;font-size:14px;color:var(--muted);background:#f8fafc
    }
    .history-list{
      display:grid;gap:8px
    }
    .history-item{
      border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff;display:grid;gap:8px
    }
    .history-item-top{
      display:flex;align-items:center;justify-content:space-between;gap:8px
    }
    .history-item-main{
      font-size:15px;font-weight:700
    }
    .history-item-time{
      font-size:12px;color:var(--muted)
    }
    .history-item-grid{
      display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px
    }
    .history-label{
      color:var(--muted);margin-bottom:2px
    }
    .badge{
      display:inline-flex;align-items:center;justify-content:center;min-width:56px;min-height:28px;
      border-radius:999px;padding:0 10px;font-size:12px;font-weight:800;border:1px solid transparent
    }
    .badge.ok{background:var(--okbg);border-color:var(--ok);color:#047857}
    .badge.ng{background:var(--ngbg);border-color:var(--ng);color:#b91c1c}
    .camera-wrap{
      position:fixed;inset:0;background:rgba(15,23,42,.72);display:none;align-items:center;justify-content:center;
      z-index:999;padding:20px
    }
    .camera-card{
      width:min(92vw,560px);background:#000;border-radius:20px;overflow:hidden;position:relative;
      box-shadow:0 20px 50px rgba(0,0,0,.35)
    }
    .camera-card video{width:100%;display:block}
    .scan-guide{
      position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
      width:62%;aspect-ratio:1/1;border:3px solid rgba(255,255,255,.92);border-radius:18px;pointer-events:none
    }
    .camera-footer{
      position:absolute;left:0;right:0;bottom:0;padding:12px;background:linear-gradient(to top, rgba(0,0,0,.68), rgba(0,0,0,0));
      color:#fff;font-size:14px
    }
    .camera-close{
      position:absolute;right:12px;top:12px;width:42px;height:42px;border:none;border-radius:999px;
      background:rgba(255,255,255,.18);color:#fff;font-size:20px;font-weight:800;cursor:pointer
    }
    @media (max-width:900px){
      .topbar{flex-direction:column;align-items:stretch}
      .topbar-controls{grid-template-columns:1fr;min-width:0}
      .info-row{grid-template-columns:1fr}
      .bottom-panel{grid-template-columns:1fr}
      .toolbar{grid-template-columns:1fr 1fr}
      .app{grid-template-rows:auto minmax(280px, 1fr) auto auto}
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
</head>
<body>
  <div class="app">

        <div class="title" id="pageTitle">繧ｵ繝ｳ繝励Ν迴ｾ蝣ｴA</div>

  <div class="camera-wrap" id="cameraWrap">

  <canvas id="qrCanvas" style="display:none;"></canvas>

  <script>
    const SITE_DATA_URL = "sites.json";
    let sites = {};
    let currentTitle = "";
    let currentSite = null;
    let currentDrawingId = "";
    let currentDrawing = null;
    let historyKey = "";
    let drawingLoadToken = 0;

    const MARKER_RADIUS = 6;
    const BASE_HIT_RADIUS = 14;
    const NEIGHBOR_LIMIT_RATIO = 0.45;
    const TAP_MOVE_THRESHOLD = 10;
    const SELECTION_FEEDBACK_MS = 200;
    const SELECTION_FEEDBACK_SCALE = 1.2;

    let selected = null;
    let feedbackMarkerId = "";
    let selectionFeedbackToken = 0;
    let markerStatuses = {};
    let latestJudgement = null;
    let history = [];
    let videoStream = null;
    let scanTimer = null;
    let planMetrics = { left: 0, top: 0, width: 0, height: 0 };
    let viewTransform = { x: 0, y: 0, scale: 1 };
    let gestureState = { mode: "idle", lastX: 0, lastY: 0, startScale: 1, startDistance: 0, startX: 0, startY: 0, startMidX: 0, startMidY: 0 };
    let tapStart = null;
    let gestureMoved = false;
    let panzoomRecoveryFrame = null;
    let historyPanelOpen = false;
    const planViewport = document.getElementById("planViewport");
    const planContent = document.getElementById("planContent");
    const planStage = document.getElementById("planStage");
    const planImage = document.getElementById("planImage");
    const markerLayer = document.getElementById("markerLayer");
    const pageTitle = document.getElementById("pageTitle");
    const pageMeta = document.getElementById("pageMeta");
    const siteSelector = document.getElementById("siteSelector");
    const drawingSelector = document.getElementById("drawingSelector");
    const adminLink = document.getElementById("adminLink");
    const selectedMain = document.getElementById("selectedMain");
    const selectedSub = document.getElementById("selectedSub");
    const qrInput = document.getElementById("qrInput");
    const manualJudgeBtn = document.getElementById("manualJudgeBtn");
    const cameraStatus = document.getElementById("cameraStatus");
    const resultBox = document.getElementById("resultBox");
    const historyCount = document.getElementById("historyCount");
    const historyPanel = document.getElementById("historyPanel");
    const historyList = document.getElementById("historyList");
    const historyEmpty = document.getElementById("historyEmpty");
    const historyToggleBtn = document.getElementById("historyToggleBtn");
    const clearHistoryBtn = document.getElementById("clearHistoryBtn");
    const cameraWrap = document.getElementById("cameraWrap");
    const video = document.getElementById("video");
    const canvas = document.getElementById("qrCanvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });

    function normalizePositionRecord(position){
      const id = String(position?.id || "").trim();
      const displayName = String(position?.displayName || "").trim();
      const gridX = String(position?.gridX || "").trim();
      const gridY = String(position?.gridY || "").trim();
      const label = String(position?.label || "").trim();
      const requiredType = String(position?.requiredType || "").trim();
      const x = Number(position?.x);
      const y = Number(position?.y);

      if (!id || !displayName || !requiredType) return null;
      if (!Number.isFinite(x) || !Number.isFinite(y)) return null;
      if (x < 0 || x > 1 || y < 0 || y > 1) return null;

      return { id, displayName, gridX, gridY, label, requiredType, x, y };
    }

    function normalizeDrawingRecord(drawing){
      const drawingId = String(drawing?.drawingId || "").trim();
      const drawingName = String(drawing?.drawingName || "").trim();
      const keyPlanImage = String(drawing?.keyPlanImage || drawing?.image || "").trim();
      const positionsFile = String(drawing?.positionsFile || "").trim();
      const sourceData = Array.isArray(drawing?.sourceData) ? drawing.sourceData : [];

      return { drawingId, drawingName, keyPlanImage, positionsFile, sourceData, positions: [] };
    }

    function normalizeSiteRecord(site){
      const siteId = String(site?.siteId || site?.title || "").trim();
      const drawings = Array.isArray(site?.drawings)
        ? site.drawings.map(normalizeDrawingRecord).filter(drawing => drawing.drawingId && drawing.drawingName && drawing.keyPlanImage && drawing.positionsFile)
        : [];
      const defaultDrawingId = String(site?.defaultDrawingId || drawings[0]?.drawingId || "").trim();

      return {
        siteId,
        siteName: String(site?.siteName || "").trim(),
        defaultDrawingId,
        drawings
      };
    }

    async function loadSitesData(){
      const response = await fetch(SITE_DATA_URL, { cache: "no-store" });
      if (!response.ok){
        throw new Error(`Failed to load ${SITE_DATA_URL}: ${response.status}`);
      }

      const rawPayload = await response.json();
      const rawSites = Array.isArray(rawPayload?.sites) ? rawPayload.sites : [];
      if (!rawSites.length){
        throw new Error(`${SITE_DATA_URL} does not contain any site records.`);
      }

      const nextSites = {};
      rawSites.forEach(rawSite => {
        const site = normalizeSiteRecord(rawSite);
        if (!site.siteId || !site.drawings.length) return;
        nextSites[site.siteId] = site;
      });

      if (!Object.keys(nextSites).length){
        throw new Error(`${SITE_DATA_URL} does not contain any valid site records.`);
      }

      return nextSites;
    }

    function resolveInitialTitle(nextSites){
      const defaultTitle = Object.keys(nextSites)[0];
      const params = new URLSearchParams(location.search);
      const requestedTitle = params.get("SITE") || params.get("TITLE");
      return nextSites[requestedTitle] ? requestedTitle : defaultTitle;
    }

    function resolveInitialDrawingId(site){
      const requestedDrawingId = new URLSearchParams(location.search).get("DRAWING");
      const hasRequested = site.drawings.some(drawing => drawing.drawingId === requestedDrawingId);
      if (hasRequested) return requestedDrawingId;
      const hasDefault = site.drawings.some(drawing => drawing.drawingId === site.defaultDrawingId);
      return hasDefault ? site.defaultDrawingId : site.drawings[0].drawingId;
    }

    function setCurrentSite(title){
      currentTitle = title;
      currentSite = sites[title];
    }

    function setCurrentDrawing(drawingId){
      currentDrawingId = drawingId;
      currentDrawing = currentSite.drawings.find(drawing => drawing.drawingId === drawingId) || currentSite.drawings[0];
      currentDrawingId = currentDrawing.drawingId;
      historyKey = `history_${currentSite.siteId}_${currentDrawingId}`;
    }

    function populateSiteSelector(){
      siteSelector.innerHTML = currentTitle
        ? Object.values(sites).map(site => `<option value="${site.siteId}">${site.siteName}</option>`).join("")
        : "";
      siteSelector.value = currentSite?.siteId || "";
    }

    function populateDrawingSelector(){
      drawingSelector.innerHTML = currentSite
        ? currentSite.drawings.map(drawing => `<option value="${drawing.drawingId}">${drawing.drawingName}</option>`).join("")
        : "";
      drawingSelector.value = currentDrawingId || "";
    }

    function syncQuery(){
      const params = new URLSearchParams({
        SITE: currentSite.siteId,
        DRAWING: currentDrawingId
      });
      history.replaceState(null, "", `?${params.toString()}`);
    }

    function ensurePlanImageLoaded(src){
      return new Promise((resolve, reject) => {
        const finish = () => {
          planImage.removeEventListener("load", finish);
          planImage.removeEventListener("error", fail);
          resolve();
        };
        const fail = () => {
          planImage.removeEventListener("load", finish);
          planImage.removeEventListener("error", fail);
          reject(new Error(`Failed to load image: ${src}`));
        };

        if (planImage.getAttribute("src") !== src){
          planImage.addEventListener("load", finish, { once: true });
          planImage.addEventListener("error", fail, { once: true });
          planImage.src = src;
          return;
        }

        if (planImage.complete && planImage.naturalWidth){
          resolve();
          return;
        }

        planImage.addEventListener("load", finish, { once: true });
        planImage.addEventListener("error", fail, { once: true });
      });
    }

    async function loadPositionsForDrawing(drawing){
      const response = await fetch(drawing.positionsFile, { cache: "no-store" });
      if (!response.ok){
        throw new Error(`Failed to load positions file: ${drawing.positionsFile}`);
      }

      const rawPositions = await response.json();
      if (!Array.isArray(rawPositions)) return [];

      const naturalWidth = planImage.naturalWidth || 1;
      const naturalHeight = planImage.naturalHeight || 1;

      return rawPositions.map(position => normalizePositionRecord({
        id: position?.id,
        displayName: position?.id,
        gridX: "",
        gridY: "",
        label: position?.id,
        requiredType: position?.spec,
        x: Number(position?.x) / naturalWidth,
        y: Number(position?.y) / naturalHeight
      })).filter(Boolean);
    }

    async function loadDrawing(){
      const token = ++drawingLoadToken;
      selected = null;
      feedbackMarkerId = "";
      latestJudgement = null;
      markerStatuses = {};
      document.title = `${currentSite.siteName} ${currentDrawing.drawingName}`;
      pageTitle.textContent = currentSite.siteName;
      pageMeta.textContent = currentDrawing.drawingName;
      adminLink.href = `admin.html?SITE=${encodeURIComponent(currentSite.siteId)}&DRAWING=${encodeURIComponent(currentDrawingId)}`;
      resetViewTransform();
      resetGestureTracking();
      await ensurePlanImageLoaded(currentDrawing.keyPlanImage);
      const positions = await loadPositionsForDrawing(currentDrawing);
      if (token !== drawingLoadToken) return;
      currentDrawing.positions = positions;
      syncPlanViewport(true);
      renderAll();
    }

    function applyContentTransform(){
      planContent.style.transform = `translate(${viewTransform.x}px, ${viewTransform.y}px) scale(${viewTransform.scale})`;
    }

    function resetViewTransform(){
      viewTransform = { x: 0, y: 0, scale: 1 };
      applyContentTransform();
    }

    function recoverPanzoomAfterCamera(){
      if (panzoomRecoveryFrame){
        cancelAnimationFrame(panzoomRecoveryFrame);
        panzoomRecoveryFrame = null;
      }
      resetGestureTracking();
      if (document.activeElement && typeof document.activeElement.blur === "function"){
        document.activeElement.blur();
      }
      planContent.style.pointerEvents = "none";
      let frames = 0;
      const step = () => {
        frames += 1;
        if (frames < 3){
          panzoomRecoveryFrame = requestAnimationFrame(step);
          return;
        }
        planContent.style.pointerEvents = "";
        syncPlanViewport(true);
        renderAll();
        panzoomRecoveryFrame = null;
      };
      panzoomRecoveryFrame = requestAnimationFrame(step);
    }

    function resetGestureTracking(){
      tapStart = null;
      gestureMoved = false;
      gestureState = { mode: "idle", lastX: 0, lastY: 0, startScale: 1, startDistance: 0, startX: 0, startY: 0, startMidX: 0, startMidY: 0 };
    }

    function getTouchDistance(touches){
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.hypot(dx, dy);
    }

    function getTouchMidpoint(touches){
      return {
        x: (touches[0].clientX + touches[1].clientX) / 2,
        y: (touches[0].clientY + touches[1].clientY) / 2
      };
    }

    function clampScale(scale){
      return Math.max(1, Math.min(4, scale));
    }
    function parseQrValue(raw){
      if (!raw) return "";
      const text = raw.trim().toUpperCase();
      const patterns = [/TYPE[:=]([A-Z0-9-]+)/, /\b(EB\d+-\d+-\d+)\b/];
      for (const pattern of patterns){
        const match = text.match(pattern);
        if (match) return match[1];
      }
      return text;
    }

    function getResult(){
      const parsed = parseQrValue(qrInput.value);
      if (!selected || !parsed) return null;
      return parsed === selected.requiredType ? "ok" : "ng";
    }

    function getBaseImageRect(){
      const viewportWidth = planViewport.clientWidth - 16;
      const viewportHeight = planViewport.clientHeight - 16;
      const naturalWidth = planImage.naturalWidth || 1;
      const naturalHeight = planImage.naturalHeight || 1;
      const imageRatio = naturalWidth / naturalHeight;
      const viewportRatio = viewportWidth / viewportHeight;

      let width = viewportWidth;
      let height = viewportHeight;

      if (imageRatio > viewportRatio){
        height = width / imageRatio;
      } else {
        width = height * imageRatio;
      }

      return { left: 0, top: 0, width, height };
    }

    function syncPlanViewport(reset = false){
      planMetrics = getBaseImageRect();
      planStage.style.left = `${(planContent.clientWidth - planMetrics.width) / 2}px`;
      planStage.style.top = `${(planContent.clientHeight - planMetrics.height) / 2}px`;
      planStage.style.width = `${planMetrics.width}px`;
      planStage.style.height = `${planMetrics.height}px`;
      if (reset) resetViewTransform();
    }

    function getPlanPointFromEvent(event){
      if (!planMetrics.width || !planMetrics.height) return null;
      const stageRect = planStage.getBoundingClientRect();
      if (!stageRect.width || !stageRect.height) return null;

      return {
        x: (event.clientX - stageRect.left) * (planMetrics.width / stageRect.width),
        y: (event.clientY - stageRect.top) * (planMetrics.height / stageRect.height)
      };
    }

    function getPositionPoint(pos){
      return {
        x: planMetrics.width * pos.x,
        y: planMetrics.height * pos.y
      };
    }

    function getPointDistance(a, b){
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function calcSafeHitRadius(target, positions, baseHitRadius = BASE_HIT_RADIUS){
      if (!planMetrics.width || !planMetrics.height) return baseHitRadius;

      const targetPoint = getPositionPoint(target);
      let nearestNeighborDistance = Infinity;

      positions.forEach(pos => {
        if (pos.id === target.id) return;
        const distance = getPointDistance(targetPoint, getPositionPoint(pos));
        if (distance < nearestNeighborDistance){
          nearestNeighborDistance = distance;
        }
      });

      if (!Number.isFinite(nearestNeighborDistance)){
        return baseHitRadius;
      }

      return Math.min(baseHitRadius, nearestNeighborDistance * NEIGHBOR_LIMIT_RATIO);
    }

    function findNearestPosition(point){
      if (!point || !currentDrawing?.positions?.length) return null;

      let nearest = null;
      let nearestDistance = Infinity;

      currentDrawing.positions.forEach(pos => {
        const distance = getPointDistance(point, getPositionPoint(pos));
        if (distance < nearestDistance){
          nearest = pos;
          nearestDistance = distance;
        }
      });

      if (!nearest) return null;

      const safeHitRadius = calcSafeHitRadius(nearest, currentDrawing.positions);
      return nearestDistance <= safeHitRadius ? nearest : null;
    }

    function getMarkerStatusClass(pos){
      if (selected && selected.id === pos.id) return " active";
      const status = markerStatuses[pos.id];
      if (status === "ok") return " ok";
      if (status === "ng") return " ng";
      return "";
    }

    function applyJudgement(result, parsed){
      if (!selected || !result || !parsed) return;

      const judgedPosition = selected;
      markerStatuses[judgedPosition.id] = result;
      latestJudgement = {
        positionId: judgedPosition.id,
        displayName: judgedPosition.displayName,
        label: judgedPosition.label,
        requiredType: judgedPosition.requiredType,
        scannedType: parsed,
        result
      };
      selected = null;
      feedbackMarkerId = "";
      selectionFeedbackToken += 1;
      if (navigator.vibrate){
        navigator.vibrate(result === "ok" ? 60 : [80, 60, 80]);
      }
    }

    function syncJudgementFromInput(){
      const parsed = parseQrValue(qrInput.value);
      const result = getResult();
      if (selected && parsed && result){
        applyJudgement(result, parsed);
      }
      renderAll();
    }

    function judgeManualInput(){
      if (!selected){
        alert("譟ｱ菴咲ｽｮ繧帝∈謚槭＠縺ｦ縺上□縺輔＞縲・);
        return;
      }

      const parsed = parseQrValue(qrInput.value);
      if (!parsed){
        alert("TYPE繧貞・蜉帙＠縺ｦ縺上□縺輔＞縲・);
        return;
      }

      const result = parsed === selected.requiredType ? "ok" : "ng";
      applyJudgement(result, parsed);
      renderAll();
    }

    async function selectPosition(pos){
      if (!pos) return;
      const token = ++selectionFeedbackToken;
      selected = pos;
      feedbackMarkerId = pos.id;
      latestJudgement = null;
      qrInput.value = "";
      cameraStatus.textContent = "譛ｪ襍ｷ蜍・;
      renderAll();

      await new Promise(resolve => setTimeout(resolve, SELECTION_FEEDBACK_MS));
      if (token !== selectionFeedbackToken) return;

      await startCamera();
    }

    function renderMarkers(){
      markerLayer.innerHTML = "";
      if (!planMetrics.width || !planMetrics.height) return;
      markerLayer.setAttribute("viewBox", `0 0 ${planMetrics.width} ${planMetrics.height}`);
      markerLayer.setAttribute("width", planMetrics.width);
      markerLayer.setAttribute("height", planMetrics.height);

      const svgNs = "http://www.w3.org/2000/svg";

      currentDrawing.positions.forEach(pos => {
        const cx = planMetrics.width * pos.x;
        const cy = planMetrics.height * pos.y;
        const isFeedback = feedbackMarkerId === pos.id;

        const marker = document.createElementNS(svgNs, "circle");
        marker.setAttribute("class", "marker" + getMarkerStatusClass(pos) + (isFeedback ? " feedback" : ""));
        marker.setAttribute("cx", cx);
        marker.setAttribute("cy", cy);
        marker.setAttribute("r", isFeedback ? MARKER_RADIUS * SELECTION_FEEDBACK_SCALE : MARKER_RADIUS);

        markerLayer.appendChild(marker);
      });
    }

    function renderSelection(){
      if (!selected){
        selectedMain.textContent = "譛ｪ驕ｸ謚・;
        selectedSub.textContent = "";
      } else {
        selectedMain.textContent = selected.displayName;
        selectedSub.textContent = "";
      }
    }

    function renderResult(){
      const parsed = parseQrValue(qrInput.value);
      const result = getResult();
      const displayResult = selected && parsed && result
        ? { requiredType: selected.requiredType, scannedType: parsed, result }
        : latestJudgement;

      if (!displayResult){
        resultBox.className = "result-box";
        resultBox.innerHTML = `<div class="result-state">譛ｪ蛻､螳・/div><div class="result-detail">譟ｱ菴咲ｽｮ繧帝∈謚槭＠縺ｦ縲＿R繧定ｪｭ蜿悶＠縺ｦ縺上□縺輔＞縲・/div>`;
        return;
      }

      if (displayResult.result === "ok"){
        resultBox.className = "result-box ok";
        resultBox.innerHTML = `<div class="result-state">驕ｩ蜷・/div><div class="result-detail">蠢・ｦゝYPE: ${displayResult.requiredType}<br>隱ｭ蜿傍YPE: ${displayResult.scannedType}</div>`;
      } else {
        resultBox.className = "result-box ng";
        resultBox.innerHTML = `<div class="result-state">荳埼←蜷・/div><div class="result-detail">蠢・ｦゝYPE: ${displayResult.requiredType}<br>隱ｭ蜿傍YPE: ${displayResult.scannedType}</div>`;
      }
    }
    function renderAll(){
      renderMarkers();
      renderSelection();
      renderResult();
      renderHistoryList();
    }

    function renderHistoryList(){
      historyCount.textContent = `${history.length}莉ｶ`;
      historyPanel.classList.toggle("open", historyPanelOpen);
      historyToggleBtn.textContent = historyPanelOpen ? "螻･豁ｴ繧帝哩縺倥ｋ" : "螻･豁ｴ繧定ｦ九ｋ";

      historyList.innerHTML = "";
      historyEmpty.style.display = history.length ? "none" : "block";
      if (!history.length) return;

      history.forEach(entry => {
        const item = document.createElement("div");
        item.className = "history-item";

        const badgeClass = entry.result === "ok" ? "ok" : "ng";
        const badgeText = entry.result === "ok" ? "OK" : "NG";
        const positionText = entry.displayName || entry.pos || "-";

        item.innerHTML = `
          <div class="history-item-top">
            <div>
              <div class="history-item-main">${positionText}</div>
              <div class="history-item-time">${entry.time || "-"}</div>
            </div>
            <span class="badge ${badgeClass}">${badgeText}</span>
          </div>
          <div class="history-item-grid">
            <div>
              <div class="history-label">隱ｭ蜿門､</div>
              <div>${entry.scannedType || "-"}</div>
            </div>
            <div>
              <div class="history-label">蠢・ｦ∝､</div>
              <div>${entry.requiredType || "-"}</div>
            </div>
          </div>
        `;

        historyList.appendChild(item);
      });
    }

    function toggleHistoryPanel(){
      historyPanelOpen = !historyPanelOpen;
      renderHistoryList();
    }

    function clearCurrentSiteHistory(){
      if (!confirm("縺薙・迴ｾ蝣ｴ縺ｮ螻･豁ｴ繧貞炎髯､縺励∪縺吶ゅｈ繧阪＠縺・〒縺吶°・・)) return;
      history = [];
      markerStatuses = {};
      latestJudgement = null;
      localStorage.removeItem(historyKey);
      alert("縺薙・迴ｾ蝣ｴ縺ｮ螻･豁ｴ繧貞炎髯､縺励∪縺励◆");
      renderAll();
    }

    function stopCamera(){
      if (scanTimer){ clearInterval(scanTimer); scanTimer = null; }
      if (videoStream){
        videoStream.getTracks().forEach(track => track.stop());
        videoStream = null;
      }
      video.srcObject = null;
      cameraWrap.style.display = "none";
      cameraStatus.textContent = "譛ｪ襍ｷ蜍・;
      recoverPanzoomAfterCamera();
    }

    async function startCamera(){
      if (typeof jsQR === "undefined"){
        alert("QR隱ｭ蜿悶Λ繧､繝悶Λ繝ｪ縺ｮ隱ｭ霎ｼ縺ｫ螟ｱ謨励＠縺ｾ縺励◆縲る壻ｿ｡迺ｰ蠅・ｒ遒ｺ隱阪＠縺ｦ蜀崎ｪｭ縺ｿ霎ｼ縺ｿ縺励※縺上□縺輔＞縲・);
        return;
      }
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
        alert("縺薙・繝悶Λ繧ｦ繧ｶ縺ｧ縺ｯ繧ｫ繝｡繝ｩ襍ｷ蜍輔↓蟇ｾ蠢懊＠縺ｦ縺・∪縺帙ｓ縲・);
        return;
      }

      try{
        stopCamera();
        videoStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        video.srcObject = videoStream;
        cameraWrap.style.display = "flex";
        cameraStatus.textContent = "繧ｫ繝｡繝ｩ襍ｷ蜍穂ｸｭ";
        await video.play();

        scanTimer = setInterval(() => {
          if (!video.videoWidth || !video.videoHeight) return;
          const w = video.videoWidth;
          const h = video.videoHeight;
          canvas.width = w;
          canvas.height = h;
          ctx.drawImage(video, 0, 0, w, h);
          const imageData = ctx.getImageData(0, 0, w, h);
          const code = jsQR(imageData.data, w, h, { inversionAttempts: "dontInvert" });
          if (code && code.data){
            qrInput.value = code.data;
            cameraStatus.textContent = "QR隱ｭ蜿門ｮ御ｺ・;
            syncJudgementFromInput();
            stopCamera();
          }
        }, 320);
      } catch (error){
        alert("繧ｫ繝｡繝ｩ繧定ｵｷ蜍輔〒縺阪∪縺帙ｓ縺ｧ縺励◆縲４afari縺ｮ繧ｫ繝｡繝ｩ險ｱ蜿ｯ險ｭ螳壹ｒ遒ｺ隱阪＠縺ｦ縺上□縺輔＞縲・);
        cameraStatus.textContent = "繧ｫ繝｡繝ｩ襍ｷ蜍募､ｱ謨・;
      }
    }

    function saveHistory(){
      const judged = latestJudgement;
      if (!judged){
        alert("譟ｱ菴咲ｽｮ縺ｮ驕ｸ謚槭→QR蛟､縺ｮ蛻､螳壹′蠢・ｦ√〒縺吶・);
        return;
      }
      history.unshift({
        time: new Date().toISOString().slice(0,19).replace("T"," "),
        pos: judged.positionId,
        displayName: judged.displayName,
        label: judged.label,
        requiredType: judged.requiredType,
        scannedType: judged.scannedType,
        result: judged.result
      });
      localStorage.setItem(historyKey, JSON.stringify(history));
      if (judged.result === "ok" || judged.result === "ng"){
        markerStatuses[judged.positionId] = judged.result;
      }
      alert("辣ｧ蜷亥ｱ･豁ｴ繧剃ｿ晏ｭ倥＠縺ｾ縺励◆");
      renderAll();
    }

    function loadHistory(){
      const legacyHistoryKeys = [
        currentSite?.siteId ? `history_${currentSite.siteId}` : "",
        currentSite?.title ? `history_${currentSite.title}` : ""
      ].filter(Boolean);

      try{
        history = JSON.parse(localStorage.getItem(historyKey) || "[]");
        if (!history.length){
          for (const legacyHistoryKey of legacyHistoryKeys){
            if (legacyHistoryKey === historyKey) continue;
            history = JSON.parse(localStorage.getItem(legacyHistoryKey) || "[]");
            if (history.length) break;
          }
        }
      } catch {
        history = [];
      }

      markerStatuses = {};
      history.forEach(entry => {
        if (!entry?.pos) return;
        if (entry.result === "ok" || entry.result === "ng"){
          markerStatuses[entry.pos] = entry.result;
        }
      });
    }

    async function initializeApp(){
      sites = await loadSitesData();
      setCurrentSite(resolveInitialTitle(sites));
      setCurrentDrawing(resolveInitialDrawingId(currentSite));
      populateSiteSelector();
      populateDrawingSelector();
      syncQuery();
      await loadDrawing();
      loadHistory();
      renderAll();
    }

    siteSelector.addEventListener("change", async event => {
      setCurrentSite(event.target.value);
      setCurrentDrawing(currentSite.defaultDrawingId);
      populateSiteSelector();
      populateDrawingSelector();
      syncQuery();
      await loadDrawing();
      loadHistory();
      renderAll();
    });

    drawingSelector.addEventListener("change", async event => {
      setCurrentDrawing(event.target.value);
      populateDrawingSelector();
      syncQuery();
      await loadDrawing();
      loadHistory();
      renderAll();
    });

    document.getElementById("cameraOnBtn").addEventListener("click", startCamera);
    document.getElementById("cameraOffBtn").addEventListener("click", stopCamera);
    document.getElementById("cameraCloseBtn").addEventListener("click", stopCamera);
    document.getElementById("saveBtn").addEventListener("click", saveHistory);
    manualJudgeBtn.addEventListener("click", judgeManualInput);
    historyToggleBtn.addEventListener("click", toggleHistoryPanel);
    clearHistoryBtn.addEventListener("click", clearCurrentSiteHistory);
    qrInput.addEventListener("keydown", event => {
      if (event.key !== "Enter") return;
      event.preventDefault();
      judgeManualInput();
    });

    planStage.addEventListener("pointerdown", event => {
      if (event.pointerType === "mouse" && event.button !== 0) return;
      tapStart = { x: event.clientX, y: event.clientY };
      gestureMoved = false;
    });

    planStage.addEventListener("pointerup", async event => {
      if (!tapStart) return;
      const moveDistance = Math.hypot(event.clientX - tapStart.x, event.clientY - tapStart.y);
      const isTap = moveDistance < TAP_MOVE_THRESHOLD && !gestureMoved;
      tapStart = null;
      if (!isTap) return;
      const nearest = findNearestPosition(getPlanPointFromEvent(event));
      if (nearest) await selectPosition(nearest);
    });

    planStage.addEventListener("pointercancel", () => { tapStart = null; });

    planContent.addEventListener("touchstart", event => {
      if (event.touches.length === 1){
        const touch = event.touches[0];
        gestureState = { ...gestureState, mode: "drag", lastX: touch.clientX, lastY: touch.clientY };
      } else if (event.touches.length === 2){
        const midpoint = getTouchMidpoint(event.touches);
        gestureState = {
          ...gestureState,
          mode: "pinch",
          startScale: viewTransform.scale,
          startDistance: getTouchDistance(event.touches),
          startX: viewTransform.x,
          startY: viewTransform.y,
          startMidX: midpoint.x,
          startMidY: midpoint.y
        };
        tapStart = null;
        gestureMoved = true;
      }
    }, { passive: true });

    planContent.addEventListener("touchmove", event => {
      if (gestureState.mode === "drag" && event.touches.length === 1){
        const touch = event.touches[0];
        const dx = touch.clientX - gestureState.lastX;
        const dy = touch.clientY - gestureState.lastY;
        viewTransform.x += dx;
        viewTransform.y += dy;
        gestureState.lastX = touch.clientX;
        gestureState.lastY = touch.clientY;
        gestureMoved = true;
        applyContentTransform();
        event.preventDefault();
      } else if (gestureState.mode === "pinch" && event.touches.length === 2){
        const midpoint = getTouchMidpoint(event.touches);
        const nextScale = clampScale(gestureState.startScale * (getTouchDistance(event.touches) / Math.max(gestureState.startDistance, 1)));
        const anchorX = (gestureState.startMidX - gestureState.startX) / gestureState.startScale;
        const anchorY = (gestureState.startMidY - gestureState.startY) / gestureState.startScale;
        viewTransform.scale = nextScale;
        viewTransform.x = midpoint.x - anchorX * nextScale;
        viewTransform.y = midpoint.y - anchorY * nextScale;
        gestureMoved = true;
        applyContentTransform();
        event.preventDefault();
      }
    }, { passive: false });

    planContent.addEventListener("touchend", () => {
      resetGestureTracking();
    }, { passive: true });

    planContent.addEventListener("touchcancel", () => {
      resetGestureTracking();
    }, { passive: true });

    planImage.addEventListener("load", () => {
      syncPlanViewport(true);
      renderAll();
    });

    window.addEventListener("resize", () => {
      syncPlanViewport(true);
      renderAll();
    });

    initializeApp().catch(error => {
      console.error(error);
      alert("迴ｾ蝣ｴ繝・・繧ｿ縺ｮ隱ｭ霎ｼ縺ｫ螟ｱ謨励＠縺ｾ縺励◆縲ゅロ繝・ヨ繝ｯ繝ｼ繧ｯ謗･邯壹√∪縺溘・迴ｾ蝣ｴ繝・・繧ｿ險ｭ螳壹ｒ遒ｺ隱阪＠縺ｦ縺上□縺輔＞縲・);
    });
  </script>
