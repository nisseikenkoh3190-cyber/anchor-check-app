<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>アンカーボルト照合アプリ 現場完成版</title>
  <style>
    :root{
      --bg:#f4f7fb; --card:#fff; --line:#cbd5e1; --text:#0f172a; --muted:#475569;
      --ok:#10b981; --okbg:#ecfdf5; --ng:#ef4444; --ngbg:#fef2f2; --accent:#0f172a;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{
      padding:max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right))
             max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
    }
    .app{
      max-width:980px; margin:0 auto; min-height:calc(100vh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 20px);
      display:grid; grid-template-rows:auto minmax(320px, 1fr) auto auto; gap:10px;
    }
    .topbar{
      display:flex;justify-content:space-between;align-items:center;gap:8px;
      background:var(--card);border:1px solid var(--line);border-radius:16px;padding:10px 12px
    }
    .title{font-size:16px;font-weight:700}
    .meta{font-size:12px;color:var(--muted)}
    .link-btn{
      display:inline-flex;align-items:center;justify-content:center;min-height:42px;
      border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--text);
      padding:0 12px;text-decoration:none;font-size:14px;font-weight:600
    }
    .plan-card{
      position:relative;background:var(--card);border:1px solid var(--line);
      border-radius:18px;overflow:hidden;min-height:320px
    }
    .plan-wrap{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;padding:8px;overflow:hidden
    }
    .plan-stage{
      position:relative;flex:0 0 auto;touch-action:none
    }
    .plan-img{
      display:block;width:100%;height:100%;object-fit:fill;user-select:none;
      -webkit-user-drag:none;pointer-events:none
    }
    .marker-layer{position:absolute;inset:0;pointer-events:none}
    .marker{
      position:absolute;width:24px;height:24px;transform:translate(-50%,-50%);
      border-radius:999px;border:3px solid #b45309;background:rgba(245,158,11,.22);
      box-shadow:0 1px 6px rgba(0,0,0,.12);cursor:pointer;pointer-events:auto;touch-action:manipulation
    }
    .marker.active{
      width:30px;height:30px;border-color:#0369a1;background:rgba(14,165,233,.30);
      box-shadow:0 0 0 5px rgba(14,165,233,.14)
    }
    .marker-label{
      position:absolute;transform:translate(-50%, calc(-100% - 16px));
      font-size:13px;font-weight:700;white-space:nowrap;pointer-events:none;
      text-shadow:0 1px 2px rgba(255,255,255,.92)
    }
    .info-row{display:grid;grid-template-columns:1fr 1.1fr;gap:10px}
    .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px}
    .panel-title{font-size:12px;color:var(--muted);margin-bottom:6px}
    .selected-main{font-size:22px;font-weight:800;line-height:1.2}
    .selected-sub{font-size:14px;color:var(--muted);margin-top:4px}
    .result-box{
      border-radius:16px;min-height:110px;display:flex;flex-direction:column;justify-content:center;
      padding:12px 14px;border:1px solid var(--line);background:#f8fafc
    }
    .result-box.ok{background:var(--okbg);border-color:var(--ok)}
    .result-box.ng{background:var(--ngbg);border-color:var(--ng)}
    .result-state{font-size:30px;font-weight:900;line-height:1}
    .result-detail{margin-top:8px;font-size:14px;line-height:1.5}
    .bottom-panel{
      background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;
      display:grid;grid-template-columns:1.1fr .85fr;gap:10px
    }
    .stack{display:grid;gap:8px}
    .toolbar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .btn,.input{
      width:100%;min-height:52px;border-radius:14px;border:1px solid var(--line);font-size:16px
    }
    .btn{background:#fff;color:var(--text);font-weight:700;cursor:pointer}
    .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
    .btn.warn{background:#fff7ed;border-color:#fdba74}
    .input{padding:12px 14px}
    .status{font-size:13px;color:var(--muted);line-height:1.4}
    .camera-wrap{
      position:fixed;inset:0;background:rgba(15,23,42,.72);display:none;align-items:center;justify-content:center;
      z-index:999;padding:20px
    }
    .camera-card{
      width:min(92vw,560px);background:#000;border-radius:20px;overflow:hidden;position:relative;
      box-shadow:0 20px 50px rgba(0,0,0,.35)
    }
    .camera-card video{width:100%;display:block}
    .scan-guide{
      position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
      width:62%;aspect-ratio:1/1;border:3px solid rgba(255,255,255,.92);border-radius:18px;pointer-events:none
    }
    .camera-footer{
      position:absolute;left:0;right:0;bottom:0;padding:12px;background:linear-gradient(to top, rgba(0,0,0,.68), rgba(0,0,0,0));
      color:#fff;font-size:14px
    }
    .camera-close{
      position:absolute;right:12px;top:12px;width:42px;height:42px;border:none;border-radius:999px;
      background:rgba(255,255,255,.18);color:#fff;font-size:20px;font-weight:800;cursor:pointer
    }
    @media (max-width:900px){
      .info-row{grid-template-columns:1fr}
      .bottom-panel{grid-template-columns:1fr}
      .toolbar{grid-template-columns:1fr 1fr}
      .app{grid-template-rows:auto minmax(280px, 1fr) auto auto}
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@4.6.0/dist/panzoom.min.js"></script>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div>
        <div class="title" id="pageTitle">アンカーボルト照合アプリ / 現場完成版</div>
        <div class="meta" id="pageMeta">現場: サンプル現場A / 図面: 251210修正ハイベース設置図</div>
      </div>
      <a class="link-btn" id="adminLink" href="admin.html">管理画面</a>
    </div>

    <div class="plan-card">
      <div class="plan-wrap">
        <div class="plan-stage" id="planStage">
          <img class="plan-img" id="planImage" alt="KEY PLAN">
          <div class="marker-layer" id="markerLayer"></div>
        </div>
      </div>
    </div>

    <div class="info-row">
      <div class="panel">
        <div class="panel-title">選択位置</div>
        <div id="selectedMain" class="selected-main">未選択</div>
        <div id="selectedSub" class="selected-sub">KEY PLAN上の柱をタップすると自動でカメラ起動</div>
      </div>
      <div class="panel">
        <div class="panel-title">判定結果</div>
        <div id="resultBox" class="result-box">
          <div class="result-state">待機</div>
          <div class="result-detail">柱位置を選択して、QRを読んでください。</div>
        </div>
      </div>
    </div>

    <div class="bottom-panel">
      <div class="stack">
        <div class="panel-title">読めない時の手動入力 / 再読取</div>
        <input class="input" id="qrInput" placeholder="読めない時はここに手入力">
        <div id="cameraStatus" class="status">待機中</div>
      </div>

      <div class="stack">
        <div class="panel-title">操作</div>
        <div class="toolbar">
          <button class="btn primary" id="cameraOnBtn">再読取</button>
          <button class="btn" id="cameraOffBtn">カメラOFF</button>
          <button class="btn warn" id="saveBtn">記録</button>
        </div>
      </div>
    </div>
  </div>

  <div class="camera-wrap" id="cameraWrap">
    <div class="camera-card">
      <button class="camera-close" id="cameraCloseBtn">×</button>
      <video id="video" autoplay playsinline muted></video>
      <div class="scan-guide"></div>
      <div class="camera-footer">QRを枠の中央に近づけてください</div>
    </div>
  </div>

  <canvas id="qrCanvas" style="display:none;"></canvas>

  <script>
    const sites = {
      sampleA: {
        title: "sampleA",
        siteName: "サンプル現場A",
        drawingName: "251210修正ハイベース設置図",
        image: "keyplan.png",
        positions: [
          { id: "X1-Y3", label: "C3", requiredType: "EB300-8-30", x: 0.188, y: 0.154 },
          { id: "X2-Y3", label: "C2", requiredType: "EB300-8-36", x: 0.371, y: 0.154 },
          { id: "X3-Y3", label: "C2", requiredType: "EB300-8-36", x: 0.548, y: 0.154 },
          { id: "X4-Y3", label: "C2", requiredType: "EB300-8-36", x: 0.725, y: 0.154 },
          { id: "X5-Y3", label: "C3", requiredType: "EB300-8-30", x: 0.907, y: 0.154 },
          { id: "X1-Y2", label: "C2", requiredType: "EB300-8-36", x: 0.188, y: 0.389 },
          { id: "X2-Y2", label: "C1", requiredType: "EB300-8-36", x: 0.371, y: 0.389 },
          { id: "X4-Y2", label: "C1", requiredType: "EB300-8-36", x: 0.725, y: 0.389 },
          { id: "X5-Y2", label: "C2", requiredType: "EB300-8-36", x: 0.907, y: 0.389 },
          { id: "X1-Y1", label: "C3", requiredType: "EB300-8-30", x: 0.188, y: 0.634 },
          { id: "X2-Y1", label: "C2", requiredType: "EB300-8-36", x: 0.371, y: 0.634 },
          { id: "X3-Y1", label: "C1", requiredType: "EB300-8-36", x: 0.548, y: 0.634 },
          { id: "X4-Y1", label: "C2", requiredType: "EB300-8-36", x: 0.725, y: 0.634 },
          { id: "X5-Y1", label: "C3", requiredType: "EB300-8-30", x: 0.907, y: 0.634 }
        ]
      },
      sampleB: {
        title: "sampleB",
        siteName: "サンプル現場B",
        drawingName: "251210修正ハイベース設置図_B",
        image: "keyplan.png",
        positions: [
          { id: "X1-Y3", label: "C3", requiredType: "EB300-8-30", x: 0.188, y: 0.154 },
          { id: "X2-Y3", label: "C2", requiredType: "EB300-8-36", x: 0.371, y: 0.154 },
          { id: "X3-Y3", label: "C2", requiredType: "EB300-8-36", x: 0.548, y: 0.154 },
          { id: "X4-Y3", label: "C2", requiredType: "EB300-8-36", x: 0.725, y: 0.154 },
          { id: "X5-Y3", label: "C3", requiredType: "EB300-8-30", x: 0.907, y: 0.154 },
          { id: "X1-Y2", label: "C2", requiredType: "EB300-8-36", x: 0.188, y: 0.389 },
          { id: "X2-Y2", label: "C1", requiredType: "EB300-8-36", x: 0.371, y: 0.389 },
          { id: "X4-Y2", label: "C1", requiredType: "EB300-8-36", x: 0.725, y: 0.389 },
          { id: "X5-Y2", label: "C2", requiredType: "EB300-8-36", x: 0.907, y: 0.389 },
          { id: "X1-Y1", label: "C3", requiredType: "EB300-8-30", x: 0.188, y: 0.634 },
          { id: "X2-Y1", label: "C2", requiredType: "EB300-8-36", x: 0.371, y: 0.634 },
          { id: "X3-Y1", label: "C1", requiredType: "EB300-8-36", x: 0.548, y: 0.634 },
          { id: "X4-Y1", label: "C2", requiredType: "EB300-8-36", x: 0.725, y: 0.634 },
          { id: "X5-Y1", label: "C3", requiredType: "EB300-8-30", x: 0.907, y: 0.634 }
        ]
      }
    };

    const defaultTitle = Object.keys(sites)[0];
    const requestedTitle = new URLSearchParams(location.search).get("TITLE");
    const currentTitle = sites[requestedTitle] ? requestedTitle : defaultTitle;
    const currentSite = sites[currentTitle];
    const historyKey = `history_${currentTitle}`;

    let selected = null;
    let history = [];
    let videoStream = null;
    let scanTimer = null;
    let panzoom = null;
    let planMetrics = { left: 0, top: 0, width: 0, height: 0 };
    let tapStart = null;
    let gestureMoved = false;
    let panzoomRecoveryFrame = null;

    const planWrap = document.querySelector(".plan-wrap");
    const planStage = document.getElementById("planStage");
    const planImage = document.getElementById("planImage");
    const markerLayer = document.getElementById("markerLayer");
    const pageTitle = document.getElementById("pageTitle");
    const pageMeta = document.getElementById("pageMeta");
    const adminLink = document.getElementById("adminLink");
    const selectedMain = document.getElementById("selectedMain");
    const selectedSub = document.getElementById("selectedSub");
    const qrInput = document.getElementById("qrInput");
    const cameraStatus = document.getElementById("cameraStatus");
    const resultBox = document.getElementById("resultBox");
    const cameraWrap = document.getElementById("cameraWrap");
    const video = document.getElementById("video");
    const canvas = document.getElementById("qrCanvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });

    function applyCurrentSite(){
      document.title = `アンカーボルト照合アプリ ${currentSite.title}`;
      pageTitle.textContent = `アンカーボルト照合アプリ / ${currentSite.title}`;
      pageMeta.textContent = `現場: ${currentSite.siteName} / 図面: ${currentSite.drawingName}`;
      planImage.src = currentSite.image;
      adminLink.href = `admin.html?TITLE=${encodeURIComponent(currentTitle)}`;
    }

    function initPanzoom(){
      if (typeof Panzoom === "undefined") return;
      if (panzoom) return;
      panzoom = Panzoom(planStage, {
        minScale: 1,
        maxScale: 4,
        startScale: 1
      });
      planStage.addEventListener("panzoompan", () => { gestureMoved = true; });
      planStage.addEventListener("panzoomzoom", () => { gestureMoved = true; });
    }

    function recoverPanzoomAfterCamera(){
      if (panzoomRecoveryFrame){
        cancelAnimationFrame(panzoomRecoveryFrame);
        panzoomRecoveryFrame = null;
      }
      gestureMoved = false;
      tapStart = null;
      if (document.activeElement && typeof document.activeElement.blur === "function"){
        document.activeElement.blur();
      }
      planStage.style.pointerEvents = "none";
      let frames = 0;
      const step = () => {
        frames += 1;
        if (frames < 3){
          panzoomRecoveryFrame = requestAnimationFrame(step);
          return;
        }
        planStage.style.pointerEvents = "";
        syncPlanViewport(true);
        renderAll();
        panzoomRecoveryFrame = null;
      };
      panzoomRecoveryFrame = requestAnimationFrame(step);
    }

    function parseQrValue(raw){
      if (!raw) return "";
      const text = raw.trim().toUpperCase();
      const patterns = [/TYPE[:=]([A-Z0-9-]+)/, /\\b(EB\\d+-\\d+-\\d+)\\b/];
      for (const p of patterns){
        const m = text.match(p);
        if (m) return m[1];
      }
      return text;
    }

    function getResult(){
      const parsed = parseQrValue(qrInput.value);
      if (!selected || !parsed) return null;
      return parsed === selected.requiredType ? "ok" : "ng";
    }

    function getBaseImageRect(){
      const wrapWidth = planWrap.clientWidth;
      const wrapHeight = planWrap.clientHeight;
      const naturalWidth = planImage.naturalWidth || 1;
      const naturalHeight = planImage.naturalHeight || 1;
      const imageRatio = naturalWidth / naturalHeight;
      const wrapRatio = wrapWidth / wrapHeight;

      let width = wrapWidth;
      let height = wrapHeight;

      if (imageRatio > wrapRatio){
        height = width / imageRatio;
      } else {
        width = height * imageRatio;
      }

      return {
        left: 0,
        top: 0,
        width,
        height
      };
    }

    function syncPlanViewport(reset = false){
      planMetrics = getBaseImageRect();
      planStage.style.width = `${planMetrics.width}px`;
      planStage.style.height = `${planMetrics.height}px`;
      if (panzoom && reset){
        panzoom.reset({ animate: false, force: true });
        panzoom.pan(0, 0, { animate: false, force: true });
        panzoom.zoom(1, { animate: false, force: true });
      }
    }

    function getPlanPointFromEvent(event){
      if (!planMetrics.width || !planMetrics.height) return null;
      const stageRect = planStage.getBoundingClientRect();
      const scale = panzoom ? panzoom.getScale() : 1;
      const localX = (event.clientX - stageRect.left) / scale;
      const localY = (event.clientY - stageRect.top) / scale;
      return {
        x: localX / planMetrics.width,
        y: localY / planMetrics.height
      };
    }

    function findNearestPosition(point){
      if (!point) return null;
      const scale = panzoom ? panzoom.getScale() : 1;
      let nearest = null;
      let nearestDistance = Infinity;
      currentSite.positions.forEach(pos => {
        const dx = (point.x - pos.x) * planMetrics.width * scale;
        const dy = (point.y - pos.y) * planMetrics.height * scale;
        const distance = Math.hypot(dx, dy);
        if (distance < nearestDistance){
          nearest = pos;
          nearestDistance = distance;
        }
      });
      return nearestDistance <= 32 ? nearest : null;
    }

    async function selectPosition(pos){
      if (!pos) return;
      selected = pos;
      renderAll();
      await startCamera();
    }

    function renderMarkers(){
      markerLayer.innerHTML = "";
      if (!planMetrics.width || !planMetrics.height) return;
      currentSite.positions.forEach(pos => {
        const left = planMetrics.width * pos.x;
        const top = planMetrics.height * pos.y;

        const marker = document.createElement("button");
        marker.className = "marker" + (selected && selected.id === pos.id ? " active" : "");
        marker.style.left = left + "px";
        marker.style.top = top + "px";
        marker.type = "button";
        marker.onclick = async () => {
          await selectPosition(pos);
        };
        marker.addEventListener("pointerup", event => event.stopPropagation());

        const label = document.createElement("div");
        label.className = "marker-label";
        label.style.left = left + "px";
        label.style.top = top + "px";
        label.textContent = pos.label;

        markerLayer.appendChild(marker);
        markerLayer.appendChild(label);
      });
    }

    function renderSelection(){
      if (!selected){
        selectedMain.textContent = "未選択";
        selectedSub.textContent = "KEY PLAN上の柱をタップすると自動でカメラ起動";
      } else {
        selectedMain.textContent = `${selected.id} / ${selected.label}`;
        selectedSub.textContent = `必要TYPE: ${selected.requiredType}`;
      }
    }

    function renderResult(){
      const parsed = parseQrValue(qrInput.value);
      const result = getResult();
      if (!result){
        resultBox.className = "result-box";
        resultBox.innerHTML = `<div class="result-state">待機</div><div class="result-detail">柱位置を選択して、QRを読んでください。</div>`;
        return;
      }
      if (result === "ok"){
        resultBox.className = "result-box ok";
        resultBox.innerHTML = `<div class="result-state">適合</div><div class="result-detail">要求: ${selected.requiredType}<br>読取: ${parsed}</div>`;
        if (navigator.vibrate) navigator.vibrate(60);
      } else {
        resultBox.className = "result-box ng";
        resultBox.innerHTML = `<div class="result-state">不一致</div><div class="result-detail">要求: ${selected.requiredType}<br>読取: ${parsed}</div>`;
        if (navigator.vibrate) navigator.vibrate([80, 60, 80]);
      }
    }

    function renderAll(){
      renderMarkers();
      renderSelection();
      renderResult();
    }

    function stopCamera(){
      if (scanTimer){ clearInterval(scanTimer); scanTimer = null; }
      if (videoStream){
        videoStream.getTracks().forEach(t => t.stop());
        videoStream = null;
      }
      video.srcObject = null;
      cameraWrap.style.display = "none";
      cameraStatus.textContent = "待機中";
      recoverPanzoomAfterCamera();
    }

    async function startCamera(){
      if (typeof jsQR === "undefined"){
        alert("QR読取ライブラリの読込に失敗しました。通信状態を確認して再読み込みしてください。");
        return;
      }
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
        alert("この端末・ブラウザではカメラ起動に対応していません。");
        return;
      }
      try{
        stopCamera();
        videoStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        video.srcObject = videoStream;
        cameraWrap.style.display = "flex";
        cameraStatus.textContent = "カメラ起動中";
        await video.play();

        scanTimer = setInterval(() => {
          if (!video.videoWidth || !video.videoHeight) return;
          const w = video.videoWidth, h = video.videoHeight;
          canvas.width = w; canvas.height = h;
          ctx.drawImage(video, 0, 0, w, h);
          const imageData = ctx.getImageData(0, 0, w, h);
          const code = jsQR(imageData.data, w, h, { inversionAttempts: "dontInvert" });
          if (code && code.data){
            qrInput.value = code.data;
            cameraStatus.textContent = "QR読取完了";
            renderResult();
            stopCamera();
          }
        }, 320);
      } catch (e){
        alert("カメラを起動できませんでした。Safariのカメラ許可を確認してください。");
        cameraStatus.textContent = "カメラ起動失敗";
      }
    }

    function saveHistory(){
      const parsed = parseQrValue(qrInput.value);
      const result = getResult();
      if (!selected || !parsed || !result){
        alert("柱位置の選択とQR値の入力が必要です。");
        return;
      }
      history.unshift({
        time: new Date().toISOString().slice(0,19).replace("T"," "),
        pos: selected.id,
        label: selected.label,
        requiredType: selected.requiredType,
        scannedType: parsed,
        result
      });
      localStorage.setItem(historyKey, JSON.stringify(history));
      alert("判定を記録しました");
    }

    function loadHistory(){
      try{
        history = JSON.parse(localStorage.getItem(historyKey) || "[]");
      } catch {
        history = [];
      }
    }

    document.getElementById("cameraOnBtn").addEventListener("click", startCamera);
    document.getElementById("cameraOffBtn").addEventListener("click", stopCamera);
    document.getElementById("cameraCloseBtn").addEventListener("click", stopCamera);
    document.getElementById("saveBtn").addEventListener("click", saveHistory);
    qrInput.addEventListener("input", renderResult);

    initPanzoom();
    planStage.addEventListener("pointerdown", event => {
      if (event.pointerType === "mouse" && event.button !== 0) return;
      tapStart = { x: event.clientX, y: event.clientY };
      gestureMoved = false;
    });
    planStage.addEventListener("pointerup", async event => {
      if (!tapStart || event.target.closest(".marker")) return;
      const moveDistance = Math.hypot(event.clientX - tapStart.x, event.clientY - tapStart.y);
      const isTap = moveDistance < 10 && !gestureMoved;
      tapStart = null;
      if (!isTap) return;
      const nearest = findNearestPosition(getPlanPointFromEvent(event));
      if (nearest) await selectPosition(nearest);
    });
    planStage.addEventListener("pointercancel", () => { tapStart = null; });
    planImage.addEventListener("load", () => {
      syncPlanViewport(true);
      renderAll();
    });
    window.addEventListener("resize", () => {
      syncPlanViewport(true);
      renderAll();
    });
    applyCurrentSite();
    loadHistory();
    syncPlanViewport(true);
    renderAll();
  </script>
</body>
</html>
