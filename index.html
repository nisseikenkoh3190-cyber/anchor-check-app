<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>アンカーボルト照合アプリ 現場1画面版</title>
  <style>
    :root {
      --bg:#f4f7fb; --card:#fff; --line:#cbd5e1; --text:#0f172a; --muted:#475569;
      --ok:#10b981; --okbg:#ecfdf5; --ng:#ef4444; --ngbg:#fef2f2; --accent:#0f172a;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin:0; height:100%; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; overflow:hidden; }
    body { padding:max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left)); }
    .app {
      height: calc(100vh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 20px);
      max-width:980px; margin:0 auto; display:grid; grid-template-rows:auto 1fr auto auto; gap:10px;
    }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:8px; background:var(--card); border:1px solid var(--line); border-radius:16px; padding:10px 12px; }
    .title { font-size:16px; font-weight:700; }
    .meta { font-size:12px; color:var(--muted); }
    .link-btn { display:inline-flex; align-items:center; justify-content:center; min-height:42px; border:1px solid var(--line); border-radius:12px; background:#fff; color:var(--text); padding:0 12px; text-decoration:none; font-size:14px; font-weight:600; }
    .plan-card { position:relative; background:var(--card); border:1px solid var(--line); border-radius:18px; overflow:hidden; min-height:0; }
    .plan-wrap { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:#fff; }
    .plan-inner { position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
    .plan-img { max-width:100%; max-height:100%; width:auto; height:auto; object-fit:contain; display:block; }
    .marker { position:absolute; width:26px; height:26px; transform:translate(-50%,-50%); border-radius:999px; border:3px solid #b45309; background:rgba(245,158,11,.22); box-shadow:0 1px 6px rgba(0,0,0,.12); cursor:pointer; }
    .marker.active { width:32px; height:32px; border-color:#0369a1; background:rgba(14,165,233,.30); box-shadow:0 0 0 5px rgba(14,165,233,.14); }
    .marker-label { position:absolute; transform:translate(-50%, calc(-100% - 18px)); font-size:13px; font-weight:700; white-space:nowrap; pointer-events:none; text-shadow:0 1px 2px rgba(255,255,255,.9); }
    .bottom { display:grid; grid-template-columns:1.25fr .95fr 1.1fr; gap:10px; }
    .panel { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:12px; min-height:120px; }
    .panel-title { font-size:12px; color:var(--muted); margin-bottom:6px; }
    .selected-main { font-size:20px; font-weight:800; line-height:1.2; }
    .selected-sub { font-size:14px; color:var(--muted); margin-top:4px; }
    .toolbar { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .btn, .input { width:100%; min-height:52px; border-radius:14px; border:1px solid var(--line); font-size:16px; }
    .btn { background:#fff; color:var(--text); font-weight:700; cursor:pointer; }
    .btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    .btn.warn { background:#fff7ed; border-color:#fdba74; }
    .stack { display:grid; gap:8px; }
    .input { padding:12px 14px; }
    .result-box { border-radius:16px; min-height:100%; display:flex; flex-direction:column; justify-content:center; padding:12px 14px; border:1px solid var(--line); background:#f8fafc; }
    .result-box.ok { background:var(--okbg); border-color:var(--ok); }
    .result-box.ng { background:var(--ngbg); border-color:var(--ng); }
    .result-state { font-size:28px; font-weight:900; line-height:1; }
    .result-detail { margin-top:8px; font-size:14px; line-height:1.5; }
    .status { font-size:13px; color:var(--muted); margin-top:6px; line-height:1.4; }
    .camera-wrap { position:fixed; inset:0; background:rgba(15,23,42,.72); display:none; align-items:center; justify-content:center; z-index:999; padding:20px; }
    .camera-card { width:min(92vw, 560px); background:#000; border-radius:20px; overflow:hidden; position:relative; box-shadow:0 20px 50px rgba(0,0,0,.35); }
    .camera-card video { width:100%; display:block; }
    .scan-guide { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:62%; aspect-ratio:1/1; border:3px solid rgba(255,255,255,.92); border-radius:18px; pointer-events:none; }
    .camera-footer { position:absolute; left:0; right:0; bottom:0; padding:12px; background:linear-gradient(to top, rgba(0,0,0,.68), rgba(0,0,0,0)); color:#fff; font-size:14px; }
    .camera-close { position:absolute; right:12px; top:12px; width:42px; height:42px; border:none; border-radius:999px; background:rgba(255,255,255,.18); color:#fff; font-size:20px; font-weight:800; cursor:pointer; }
    @media (max-width:900px) {
      .bottom { grid-template-columns:1fr; }
      .app { grid-template-rows:auto 1fr auto auto auto; }
      .panel { min-height:auto; }
      .result-box { min-height:116px; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
</head>

      { id: "X5-Y1", label: "C3", requiredType: "EB300-8-30", left: 90.7, top: 63.4 }
    ];

    let selected = null;
    let history = [];
    let videoStream = null;
    let scanTimer = null;

    const planInner = document.getElementById("planInner");
    const selectedMain = document.getElementById("selectedMain");
    const selectedSub = document.getElementById("selectedSub");
    const qrInput = document.getElementById("qrInput");
    const cameraStatus = document.getElementById("cameraStatus");
    const resultBox = document.getElementById("resultBox");
    const cameraWrap = document.getElementById("cameraWrap");
    const video = document.getElementById("video");
    const canvas = document.getElementById("qrCanvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });

    function parseQrValue(raw) {
      if (!raw) return "";
      const text = raw.trim().toUpperCase();
      const patterns = [/TYPE[:=]([A-Z0-9-]+)/, /\b(EB\d+-\d+-\d+)\b/];
      for (const p of patterns) {
        const m = text.match(p);
        if (m) return m[1];
      }
      return text;
    }

    function getResult() {
      const parsed = parseQrValue(qrInput.value);
      if (!selected || !parsed) return null;
      return parsed === selected.requiredType ? "ok" : "ng";
    }

    function renderMarkers() {
      [...planInner.querySelectorAll(".marker, .marker-label")].forEach(el => el.remove());
      positions.forEach(pos => {
        const marker = document.createElement("button");
        marker.className = "marker" + (selected && selected.id === pos.id ? " active" : "");
        marker.style.left = pos.left + "%";
        marker.style.top = pos.top + "%";
        marker.onclick = () => { selected = pos; renderAll(); };

        const label = document.createElement("div");
        label.className = "marker-label";
        label.style.left = pos.left + "%";
        label.style.top = pos.top + "%";
        label.textContent = pos.label;

        planInner.appendChild(marker);
        planInner.appendChild(label);
      });
    }

    function renderSelection() {
      if (!selected) {
        selectedMain.textContent = "未選択";
        selectedSub.textContent = "KEY PLAN上の柱をタップしてください";
      } else {
        selectedMain.textContent = `${selected.id} / ${selected.label}`;
        selectedSub.textContent = `必要TYPE: ${selected.requiredType}`;
      }
    }

    function renderResult() {
      const parsed = parseQrValue(qrInput.value);
      const result = getResult();
      if (!result) {
        resultBox.className = "result-box";
        resultBox.innerHTML = `<div class="result-state">待機</div><div class="result-detail">柱位置を選択して、QRを読んでください。</div>`;
        return;
      }
      if (result === "ok") {
        resultBox.className = "result-box ok";
        resultBox.innerHTML = `<div class="result-state">適合</div><div class="result-detail">要求: ${selected.requiredType}<br>読取: ${parsed}</div>`;
      } else {
        resultBox.className = "result-box ng";
        resultBox.innerHTML = `<div class="result-state">不一致</div><div class="result-detail">要求: ${selected.requiredType}<br>読取: ${parsed}</div>`;
      }
    }

    function renderAll() {
      renderMarkers();
      renderSelection();
      renderResult();
    }

    function stopCamera() {
      if (scanTimer) { clearInterval(scanTimer); scanTimer = null; }
      if (videoStream) {
        videoStream.getTracks().forEach(t => t.stop());
        videoStream = null;
      }
      video.srcObject = null;
      cameraWrap.style.display = "none";
      cameraStatus.textContent = "待機中";
    }

    async function startCamera() {
      if (typeof jsQR === "undefined") {
        alert("QR読取ライブラリの読込に失敗しました。通信状態を確認して再読み込みしてください。");
        return;
      }
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        alert("この端末・ブラウザではカメラ起動に対応していません。");
        return;
      }
      try {
        stopCamera();
        videoStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        video.srcObject = videoStream;
        cameraWrap.style.display = "flex";
        cameraStatus.textContent = "カメラ起動中";
        await video.play();

        scanTimer = setInterval(() => {
          if (!video.videoWidth || !video.videoHeight) return;
          const w = video.videoWidth, h = video.videoHeight;
          canvas.width = w; canvas.height = h;
          ctx.drawImage(video, 0, 0, w, h);
          const imageData = ctx.getImageData(0, 0, w, h);
          const code = jsQR(imageData.data, w, h, { inversionAttempts: "dontInvert" });
          if (code && code.data) {
            qrInput.value = code.data;
            cameraStatus.textContent = "QR読取完了";
            renderResult();
            stopCamera();
          }
        }, 320);
      } catch (e) {
        alert("カメラを起動できませんでした。Safariのカメラ許可を確認してください。");
        cameraStatus.textContent = "カメラ起動失敗";
      }
    }

    function saveHistory() {
      const parsed = parseQrValue(qrInput.value);
      const result = getResult();
      if (!selected || !parsed || !result) {
        alert("柱位置の選択とQR値の入力が必要です。");
        return;
      }
      history.unshift({
        time: new Date().toLocaleString("ja-JP"),
        pos: selected.id,
        label: selected.label,
        requiredType: selected.requiredType,
        scannedType: parsed,
        result
      });
      localStorage.setItem("anchorBoltHistory", JSON.stringify(history));
      alert("判定を記録しました");
    }

    function loadHistory() {
      try {
        history = JSON.parse(localStorage.getItem("anchorBoltHistory") || "[]");
      } catch {
        history = [];
      }
    }

    document.getElementById("cameraOnBtn").addEventListener("click", startCamera);
    document.getElementById("cameraOffBtn").addEventListener("click", stopCamera);
    document.getElementById("cameraCloseBtn").addEventListener("click", stopCamera);
    document.getElementById("saveBtn").addEventListener("click", saveHistory);
    qrInput.addEventListener("input", renderResult);
    document.querySelectorAll("[data-sample]").forEach(btn => btn.addEventListener("click", () => {
      qrInput.value = btn.dataset.sample;
      renderResult();
    }));

    loadHistory();
    renderAll();
  </script>
</body>
</html>
